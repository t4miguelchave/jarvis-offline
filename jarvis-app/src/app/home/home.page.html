<ion-header class="jarvis-header">
  <ion-toolbar>
    <div class="header-content">
      <div class="jarvis-logo">
        <div class="logo-ring"></div>
        <span class="logo-j">J</span>
      </div>
      <div class="header-text">
        <h1>JARVIS</h1>
        <span class="status-dot"></span>
        <span class="status-text">Online</span>
      </div>
    </div>
    <ion-buttons slot="end">
      <ion-button (click)="clearChat()" class="header-btn">
        <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button (click)="openSettings()" class="header-btn">
        <ion-icon name="settings-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content #chatContent class="chat-content">
  <div class="welcome-screen" *ngIf="messages.length === 0 && !isLoading">
    <div class="welcome-logo">
      <div class="outer-ring"></div>
      <div class="inner-ring"></div>
      <span class="welcome-j">J</span>
    </div>
    <h2>Olá, sou o Jarvis</h2>
    <p>O teu assistente pessoal com IA. Faz uma pergunta, envia uma foto para calcular calorias, ou analisa um vídeo.</p>
    <div class="quick-actions">
      <button class="quick-btn" (click)="inputText='Calorias de uma pizza margherita?'; sendMessage()">🍕 Calorias da pizza</button>
      <button class="quick-btn" (click)="inputText='Cria um plano de treino para hoje'; sendMessage()">💪 Plano de treino</button>
      <button class="quick-btn" (click)="inputText='Refeição saudável rápida?'; sendMessage()">🥗 Refeição saudável</button>
    </div>
  </div>

  <div class="messages-container">
    <div *ngFor="let msg of messages" class="message-wrapper" [class.user-wrapper]="msg.role==='user'" [class.assistant-wrapper]="msg.role==='assistant'">
      <div class="avatar" *ngIf="msg.role==='assistant'"><span>J</span></div>
      <div class="bubble" [class.user-bubble]="msg.role==='user'" [class.assistant-bubble]="msg.role==='assistant'">
        <img *ngIf="msg.imagePreview" [src]="msg.imagePreview" class="message-image" alt="imagem"/>
        <div class="video-indicator" *ngIf="msg.type==='video' && msg.role==='user'">
          <ion-icon name="videocam-outline"></ion-icon><span>Vídeo enviado</span>
        </div>
        <p class="bubble-text">{{ msg.content }}</p>
        <span class="bubble-time">{{ formatTime(msg.timestamp) }}</span>
      </div>
    </div>

    <div class="message-wrapper assistant-wrapper" *ngIf="isLoading">
      <div class="avatar"><span>J</span></div>
      <div class="bubble assistant-bubble typing-bubble">
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>
    </div>
    <div #messagesEnd></div>
  </div>
</ion-content>

<ion-footer class="chat-footer">
  <div class="input-row">
    <button class="media-btn" (click)="openMediaPicker()">
      <ion-icon name="image-outline"></ion-icon>
    </button>
    <div class="input-wrapper">
      <ion-textarea [(ngModel)]="inputText" placeholder="Fala com o Jarvis..." [autoGrow]="true" [rows]="1" (keydown)="onKeydown($event)" class="chat-input"></ion-textarea>
    </div>
    <button class="send-btn" (click)="sendMessage()" [class.active]="inputText.trim().length>0" [disabled]="isLoading">
      <ion-icon name="send-outline" *ngIf="!isLoading"></ion-icon>
      <ion-spinner name="crescent" *ngIf="isLoading"></ion-spinner>
    </button>
  </div>
</ion-footer>
